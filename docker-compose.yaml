services:
  app:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: freebie
    env_file: ./api-gateway/.env
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/freebie?schema=public
    ports:
      - "5000:5000"
    volumes:
      - ./api-gateway:/docker
      
      - ./core-gateway:/docker/core-gateway
    depends_on:
      - db
    command: >
      sh -c "
        # Install core as local package
        npm install ./core-gateway &&
        # Start the application
        npm run dev
      "
