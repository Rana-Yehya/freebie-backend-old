name: Deploy Node.js App to Hostinger

on:
  push:
    branches: [ main ]  # Trigger on main branch push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub-hosted runner

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub (if using a registry)
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
      #     password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 3: Build Docker image
      - name: Set up Docker Compose
        run: |
          docker compose -f docker-compose.yaml build
          docker compose -f docker-compose.yaml up -d
          docker ps -a

      # Step 4: Save Docker image as a .tar file (to transfer)
      - name: Save Docker Image
        run: |
          mkdir -p ./docker-images
          docker save -o ./docker-images/app.tar app
          docker save -o ./docker-images/postgres.tar postgres:16
          ls -lh ./docker-images/
      # Step 5: Transfer image to Hostinger via SCP
      - name: Upload Image to Hostinger
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          source: "docker-images/*.tar"
          target: "/home/rana/"

      # Step 6: SSH into Hostinger and deploy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          script: |
            # Load both images
            docker load -i /home/rana/app.tar
            docker load -i /home/rana/postgres.tar
            
            # Create network if not exists
            docker network create freebie-network || true
            
            # Stop and remove existing containers
            docker stop freebie postgres || true
            docker rm freebie postgres || true
            
            # Create volume if not exists
            docker volume create postgres-data || true
            
            # Start services
            docker run -d \
              --name postgres \
              --network freebie-network \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD=postgres \
              -e POSTGRES_DB=freebie \
              -p 5439:5432 \
              -v postgres-data:/var/lib/postgresql/data \
              postgres:16
            
            # Wait for PostgreSQL to be ready
            sleep 10
            
            docker run -d \
              --name freebie \
              --network freebie-network \
              -e PORT=5000 \
              -e NODE_ENV=development \
              -e DATABASE_URL=postgresql://postgres:postgres@postgres:5432/freebie?schema=public \
              -p 5000:5000 \
              -v /home/rana:/docker \
              app
            
            # Verify deployment
            docker ps -a
            docker logs freebie