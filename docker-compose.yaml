services:
  app:
    build:
      context: .
    container_name: blissy
    environment:
      - PORT=5000
      - NODE_ENV=development
      # - DATABASE_URL=postgresql://postgres:postgres@db:5432/blissy?schema=public
      # - DATABASE_URL=postgresql://blissy_user:wx8NbTqASnL1XjqCuIqAOSMcijLNj4aH@dpg-d2ceekbuibrs738e6s80-a/blissy
      - DATABASE_URL=postgresql://blissy_user:wx8NbTqASnL1XjqCuIqAOSMcijLNj4aH@dpg-d2ceekbuibrs738e6s80-a.oregon-postgres.render.com/blissy
    ports: 
      - "5000:5000"
    depends_on:
      - db
    develop:
      watch:
        - action: sync+restart
          path: ./*
          target: /docker

    volumes:
      - .:/docker
  db:
    image: postgres:16
    container_name: blissy
    environment:
      - POSTGRES_USER=blissy_user
      - POSTGRES_PASSWORD=wx8NbTqASnL1XjqCuIqAOSMcijLNj4aH
      - POSTGRES_DB=blissy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: