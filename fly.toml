# fly.toml app configuration file generated for freebie-backend on 2025-11-05T17:54:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'freebie-backend'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 5003
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
