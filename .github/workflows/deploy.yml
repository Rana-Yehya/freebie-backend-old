name: Deploy Node.js App to Hostinger

on:
  push:
    branches: [ main ]  # Trigger on main branch push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub-hosted runner

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub (if using a registry)
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
      #     password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 3: Build Docker image
      # - name: Set up Docker Compose
      #   run: |
      #     docker compose -f docker-compose.yaml build
      #     docker compose -f docker-compose.yaml up -d
      #     docker ps -a

      # Step 4: Save Docker image as a .tar file (to transfer)
      - name: Save Docker Image
        run: |
          mkdir -p ./freebie-backend
          # docker save -o ./docker/freebie.tar freebie-app  # Matches container_name
          # docker save -o ./docker/postgres.tar postgres:16
          ls -lh ./freebie-backend/
          pwd
      # Step 5: Transfer image to Hostinger via SCP
      - name: Upload Image to Hostinger
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          source: "*"
          target: "/home/rana/freebie-backend/"
      # - name: Verify Docker images exist
      #   run: |
      #     pwd
      #     ls -lh ./docker-images/
      #     test -f ./docker-images/freebie.tar && echo "freebie.tar exists" || echo "freebie.tar missing"
      #     test -f ./docker-images/postgres.tar && echo "postgres.tar exists" || echo "postgres.tar missing"
                
      # - name: Test Some Logs
      #   run: |
      #       echo "### System Info ###"
      #       whoami
      #       su - rana
      #       cd freebie-backend/
      #       git pull

      # Step 6: SSH into Hostinger and deploy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          script: |
            # Load both images
            # whoami
            # su - rana
            # docker load -i **/freebie.tar
            # docker load -i **/postgres.tar
            # Create network if not exists
            # docker network create freebie-network || true
            # cd freebie-backend/
            cd /home/rana/freebie-backend
            docker-compose down --remove-orphans

            # Stop and remove existing containers
            docker stop freebie* || true
            docker rm freebie* || true
            
            # Create volume if not exists
            # docker volume create postgres-data || true
            # Start services

            docker compose build
            # docker compose run app npx prisma generate
            # docker compose run app npx prisma migrate dev --name=test
            docker compose up

            # Verify deployment
            docker ps -a
            # docker logs freebie