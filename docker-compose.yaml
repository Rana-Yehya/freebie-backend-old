services:
  app:
    build:
      context: .
    container_name: freebie
    restart: always
    # command: nodemon --debug=PORT app.js
    environment:
      - TZ=Africa/Cairo
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_USERNAME=username
      - REDIS_PASSWORD=authpassword
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL="postgres://c271345ddf5b1c197a25504b253bff84b085c4bfb00fff74405545942b15469e:sk_D9Aq5_MDvtBRWHQMu0O2w@db.prisma.io:5432/postgres?sslmode=require"
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    develop:
      watch:
        - action: sync
          path: ./
          target: ./docker
        - action: rebuild
          path: package.json
    volumes:
      - .:/docker
  redis:
    image: redis:7.2
    command: redis-server --requirepass authpassword --user username
    container_name: redis-server
    environment:
      - TZ=Africa/Cairo
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  worker:
    build:
      context: .
    container_name: freebie-worker
    # restart: always
    environment:
      - TZ=Africa/Cairo
      - DATABASE_URL="postgres://c271345ddf5b1c197a25504b253bff84b085c4bfb00fff74405545942b15469e:sk_D9Aq5_MDvtBRWHQMu0O2w@db.prisma.io:5432/postgres?sslmode=require"
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=authpassword
      - NODE_ENV=development
    depends_on:
      - redis
      - db
    command: node helpers/cron/execute-job-in-bullmq.js
    develop:
      watch:
        - action: sync+exec
          path: ./*
          target: /docker
  db:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      - TZ=Africa/Cairo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=freebie
    ports:
      - "5439:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres-data:
